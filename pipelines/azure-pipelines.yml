trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - "*"

resources:
  repositories:
    - repository: cicd
      type: git
      name: sc-azure-portfolio/azure-infra-cicd-azuredevops

variables:
- group: github-mirror-secrets
- name: azureSubscription
  value: "omyorgapps"
- name: location
  value: "canadacentral"
- name: resourceGroup
  value: "rg-whatif-lz-portfolio"
- name: bicepFile
  value: "bicep/main.bicep"
- name: GITHUB_OWNER
  value: "osvaldoy"
- name: GITHUB_REPO
  value: "azure-landing-zone-bicep"

stages:
- stage: Validate
  jobs:
  - job: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self
    - template: pipelines/templates/validate-bicep.yml@cicd
      parameters:
        bicepFile: $(bicepFile)

- stage: WhatIf
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: WhatIf
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self
    - template: pipelines/templates/whatif-group.yml@cicd
      parameters:
        azureSubscription: $(azureSubscription)
        resourceGroup: $(resourceGroup)
        location: $(location)
        bicepFile: $(bicepFile)
        bicepParams:
          workloadName: portfolio
          env: dev
          monitoringEnabled: false
          storageEnabled: false

- stage: MirrorGitHub
  dependsOn:
    - Validate
    - WhatIf
  condition: >
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/main')
    )
  jobs:
  - job: Mirror
    pool:
      vmImage: ubuntu-latest
    steps:
    - template: pipelines/templates/mirror-github.yml@cicd
      parameters:
        githubOwner: $(GITHUB_OWNER)
        githubRepo: $(GITHUB_REPO)
